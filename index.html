<!DOCTYPE html>
<html>
<head>
    <title>Bulk Video Downloader</title>

    <style>
        body {
            background: #0a0a0a;
            font-family: Arial;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #111;
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 20px #00d4ff;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            border-radius: 8px;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00a8cc;
        }

        #status {
            margin-top: 10px;
            color: #00ffea;
        }
    </style>

</head>

<body>

<div class="box">
    <h2>Bulk Video Downloader</h2>

    <textarea id="links" placeholder="Paste Instagram / Facebook / YouTube links...&#10;One per line"></textarea>

    <button onclick="download()">Download ZIP</button>

    <p id="status"></p>
</div>

<script>
async function download() {
    let links = document.getElementById("links").value;

    if (!links.trim()) {
        alert("Please paste at least one link!");
        return;
    }

    document.getElementById("status").innerText = "Downloading... Please wait";

    let formData = new FormData();
    formData.append("links", links);

    let response = await fetch("/download", {
        method: "POST",
        body: formData
    });

    if (!response.ok) {
        document.getElementById("status").innerText = "Server error!";
        return;
    }

    let blob = await response.blob();
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "videos.zip";
    a.click();

    document.getElementById("status").innerText = "Download Complete!";
}
</script>

</body>
</html>
